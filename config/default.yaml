# Global, domain-independent settings. Override any value on the CLI.
# The active domain is loaded from config/domains/<domain>.yaml.
domain: support_tickets

generation:
  n_records: 50
  batch_size: 5
  temperature: 0.9        # high on purpose — diversity matters more than determinism here
  seed: 42                # seeds scenario-hint sampling for reproducible runs
  max_retries: 3          # extra attempts to top up a short/invalid batch
  pool:                   # pool-and-recombine for `generate: llm` entities (relational mode)
    fraction: 0.10        # author >=10% of the required count with the LLM, recombine the rest
    min_size: 20          # floor so small-N runs keep variety (10% of a tiny count is degenerate)
    recombine: sample     # sample = whole-row (coherent) | shuffle = per-field (max variety)
    #   - kicks in only when the resolved pool is smaller than the count (i.e. at scale);
    #     otherwise the entity is generated in full. Override per entity with a `pool:` block,
    #     or disable for one entity with `pool: false`.

quality:
  dedup_threshold: 0.92   # cosine similarity at/above which two records are near-duplicates
  ngram_n: 2              # n for distinct-n lexical diversity
  run_judge: true         # LLM-as-judge; set false (or --no-judge) to run fully offline
  judge_sample_size: null # null -> judge every record; int -> sample that many
  min_quality_score: 3.5  # mean judge score (1-5) for the dataset to "pass"

export:
  csv: true               # write the dataset as CSV
  chat_jsonl: true        # write fine-tuning-ready chat JSONL (uses the domain's chat_export block)

model:
  name: null              # null -> LLM_MODEL from env

paths:
  output_dir: scripts/outputs
